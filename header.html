<header style="position: fixed; top: 0; width: 100%; z-index: 9999; backdrop-filter: blur(12px); background-color: var(--bg-primary); opacity: 0.95; border-bottom: var(--border-width) solid var(--border-color);">
  <div style="max-width: 80rem; margin: 0 auto; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
    
    <div style="display: flex; flex-direction: column;">
      <a href="index.html" style="font-size: 1.875rem; font-weight: bold; letter-spacing: -0.05em; background: linear-gradient(135deg, var(--accent-iron) 0%, var(--accent-iron-dark) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none;">
        IRON
      </a>
      <span style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.2rem;">Интерактивная Российская Онлайн-база компьютерного железа</span>
    </div>
    
    <nav style="display: flex; align-items: center; gap: 2rem; font-size: 0.9375rem; font-weight: 500; flex-wrap: wrap;">
      
      <div style="position: relative;" class="dropdown">
        <button class="dropdown-btn" style="display: flex; align-items: center; gap: 0.375rem; background: none; border: none; color: var(--text-primary); cursor: pointer; padding: 0.5rem 0; font-weight: 500; transition: color 0.2s;">
          Каталог
          <svg class="dropdown-arrow" style="width: 1rem; height: 1rem; transition: transform 0.2s;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>
        
        <div class="dropdown-menu" style="position: absolute; top: 100%; left: 0; margin-top: 0.5rem; background-color: var(--bg-secondary); border: var(--border-width) solid var(--border-color); border-radius: 0.75rem; min-width: 220px; opacity: 0; visibility: hidden; transition: all 0.2s ease; z-index: 10000; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);">
          <div style="padding: 0.5rem;">
            <a href="catalog.html?category=gpu" class="dropdown-item" style="display: block; padding: 0.625rem 1rem; color: var(--text-secondary); text-decoration: none; border-radius: 0.5rem; transition: all 0.2s;">Видеокарты</a>
            <a href="catalog.html?category=cpu" class="dropdown-item" style="display: block; padding: 0.625rem 1rem; color: var(--text-secondary); text-decoration: none; border-radius: 0.5rem; transition: all 0.2s;">Процессоры</a>
            <a href="catalog.html?category=motherboard" class="dropdown-item" style="display: block; padding: 0.625rem 1rem; color: var(--text-secondary); text-decoration: none; border-radius: 0.5rem; transition: all 0.2s;">Материнские платы</a>
            <a href="catalog.html?category=ram" class="dropdown-item" style="display: block; padding: 0.625rem 1rem; color: var(--text-secondary); text-decoration: none; border-radius: 0.5rem; transition: all 0.2s;">Оперативная память</a>
            <a href="catalog.html?category=storage" class="dropdown-item" style="display: block; padding: 0.625rem 1rem; color: var(--text-secondary); text-decoration: none; border-radius: 0.5rem; transition: all 0.2s;">SSD накопители</a>
            <a href="catalog.html?category=psu" class="dropdown-item" style="display: block; padding: 0.625rem 1rem; color: var(--text-secondary); text-decoration: none; border-radius: 0.5rem; transition: all 0.2s;">Блоки питания</a>
            <a href="catalog.html?category=case" class="dropdown-item" style="display: block; padding: 0.625rem 1rem; color: var(--text-secondary); text-decoration: none; border-radius: 0.5rem; transition: all 0.2s;">Корпуса</a>
            <div style="height: 1px; background-color: var(--border-color); margin: 0.5rem 0;"></div>
            <a href="catalog.html" class="dropdown-item" style="display: block; padding: 0.625rem 1rem; color: var(--accent-cyan); text-decoration: none; border-radius: 0.5rem; transition: all 0.2s;">Весь каталог →</a>
          </div>
        </div>
      </div>
      
      <a href="index.html#about-project" style="color: var(--text-primary); text-decoration: none; transition: color 0.2s;">О проекте</a>
    </nav>

    <div style="display: flex; align-items: center; gap: 1rem;">
      <!-- Кнопка темы с надписями Dark / Light -->
      <button id="theme-toggle" 
              style="padding: 0.5rem 1.1rem; border-radius: 0.75rem; border: var(--border-width) solid var(--border-color); 
                     background: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; 
                     color: var(--text-primary); transition: all 0.2s; min-width: 78px;">
        Light
      </button>

      <a href="catalog.html" style="display: inline-block; background-color: var(--accent-iron); color: var(--bg-primary); padding: 0.75rem 1.5rem; border-radius: 1rem; font-weight: 500; text-decoration: none; transition: all 0.2s;">
        Перейти в каталог
      </a>
    </div>
  </div>
</header>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const toggleBtn = document.getElementById('theme-toggle');

    function updateButtonText() {
      const isDark = document.documentElement.classList.contains('dark');
      toggleBtn.textContent = isDark ? 'Light' : 'Dark';
    }

    toggleBtn.addEventListener('click', function() {
      const html = document.documentElement;
      
      if (html.classList.contains('light')) {
        html.classList.remove('light');
        html.classList.add('dark');
        localStorage.setItem('iron-theme', 'dark');
      } else {
        html.classList.remove('dark');
        html.classList.add('light');
        localStorage.setItem('iron-theme', 'light');
      }
      
      updateButtonText();
    });

    // Инициализация при загрузке
    const savedTheme = localStorage.getItem('iron-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.add('light');
    }
    
    updateButtonText();
  });
</script>

<style>
  .dropdown { position: relative; }
  .dropdown:hover .dropdown-menu {
    opacity: 1 !important;
    visibility: visible !important;
    transform: translateY(0) !important;
  }
  .dropdown:hover .dropdown-arrow { transform: rotate(180deg); }
  .dropdown-menu { transform: translateY(-10px); }
  .dropdown-item:hover {
    background-color: var(--bg-surface) !important;
    color: var(--accent-cyan) !important;
  }
  
  @media (max-width: 768px) {
    header > div { flex-direction: column; text-align: center; }
    nav { justify-content: center; }
    .dropdown-menu {
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      min-width: 260px;
    }
    .dropdown:hover .dropdown-menu {
      transform: translateX(-50%) translateY(0) !important;
    }
  }
</style>
